name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify (typecheck, lint, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Catches the pdfjs-dist / react-pdf version mismatch that breaks the
      # PDF viewer ("Failed to load PDF document") at runtime.
      - name: Check pdfjs-dist version
        run: npm run check:pdfjs

      # Type errors are invisible to `vite build` (esbuild/SWC skip type checking),
      # so run tsc explicitly. This would have caught e.g. the wrong prop name
      # passed to AdvancedFiltersPanel.
      #
      # NOTE: `continue-on-error` is temporary. These gates have never run on
      # this repo, so they may surface pre-existing type/lint debt. They report
      # results without blocking merges for now. Once the existing issues are
      # cleaned up, remove `continue-on-error` to make them hard gates.
      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

      # Hard gate: a failing production build means the app is broken.
      - name: Build
        run: npm run build
